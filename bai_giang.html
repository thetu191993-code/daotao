<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phòng Học EHS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        // CHỐT CHẶN ĐĂNG NHẬP: Kiểm tra xem đã có mã NV trong máy chưa
        if (!localStorage.getItem("ehs_user_id")) {
            alert("Bạn chưa đăng nhập! Vui lòng đăng nhập hệ thống để xem bài giảng.");
            window.location.href = "login.html";
        }
    </script>
</head>
<body class="bg-slate-100 min-h-screen font-sans text-slate-800 flex flex-col">

    <div class="bg-white border-b border-slate-200 p-4 sticky top-0 z-10 shadow-sm">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <h1 id="course-title" class="text-xl font-bold text-blue-700 flex items-center gap-2">
                <i class="ph-bold ph-spinner animate-spin text-2xl"></i> Đang tải...
            </h1>
            <a href="index.html" class="text-slate-500 hover:text-slate-800 font-medium flex items-center gap-1">
                <i class="ph-bold ph-arrow-left"></i> Về Trang chủ
            </a>
        </div>
    </div>

    <div class="flex-grow max-w-5xl w-full mx-auto p-4 flex flex-col gap-6 my-4">
        <!-- Khung báo lỗi -->
        <div id="error-box" class="hidden bg-red-50 border border-red-200 p-4 rounded-xl text-red-800">
            <i class="ph-fill ph-warning-circle mr-1"></i> <strong>Lỗi:</strong> <span id="error-message"></span>
        </div>

        <div class="w-full bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden" style="height: 80vh;">
            <embed id="pdf-viewer" src="" type="application/pdf" class="w-full h-full border-none">
        </div>

        <div class="bg-white p-8 rounded-xl shadow-sm border border-slate-200 text-center mt-4">
            <h3 class="text-xl font-bold mb-2">Đã hoàn thành phần học lý thuyết?</h3>
            <p class="text-slate-500 mb-6">Hãy đảm bảo anh/chị đã nắm vững các quy định an toàn trước khi bắt đầu làm bài đánh giá.</p>
            <a id="btn-quiz" href="#" class="inline-flex items-center justify-center gap-2 bg-indigo-600 text-white px-8 py-3.5 rounded-lg font-bold text-lg hover:bg-indigo-700 transition shadow-md hidden">
                <i class="ph-bold ph-pencil-simple text-2xl"></i> BẮT ĐẦU LÀM BÀI KIỂM TRA
            </a>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        // Nếu không có id trên URL, mặc định dùng 'data_ehs_chung'
        const courseId = urlParams.get('id') || 'data_ehs_chung';
        
        // Link tuyệt đối trỏ về file JSON
        const jsonPath = `https://thetu191993-code.github.io/daotao/${courseId}.json`;

        fetch(jsonPath)
            .then(response => {
                if (!response.ok) throw new Error("Không tìm thấy file: " + jsonPath);
                return response.json();
            })
            .then(data => {
                document.getElementById('course-title').innerHTML = `<i class="ph-fill ph-book-open text-2xl"></i> ${data.ten_khoa_hoc}`;
                document.getElementById('pdf-viewer').src = data.file_bai_giang;
                
                const btnQuiz = document.getElementById('btn-quiz');
                btnQuiz.href = `quiz.html?id=${courseId}`;
                btnQuiz.classList.remove('hidden');
            })
            .catch(error => {
                document.getElementById('course-title').innerHTML = '<i class="ph-fill ph-warning-circle text-red-500 text-2xl"></i> Lỗi hệ thống!';
                document.getElementById('error-box').classList.remove('hidden');
                document.getElementById('error-message').innerText = error.message;
            });
    </script>
</body>
</html>
