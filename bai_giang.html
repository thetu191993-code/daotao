<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phòng Học EHS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="bg-slate-100 min-h-screen font-sans text-slate-800 flex flex-col">

    <!-- Header -->
    <div class="bg-white border-b border-slate-200 p-4 sticky top-0 z-10 shadow-sm">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <h1 id="course-title" class="text-xl font-bold text-blue-700 flex items-center gap-2">
                <i class="ph-bold ph-spinner animate-spin text-2xl"></i> Đang tải khóa học...
            </h1>
            <a href="index.html" class="text-slate-500 hover:text-slate-800 font-medium flex items-center gap-1">
                <i class="ph-bold ph-arrow-left"></i> Quay lại
            </a>
        </div>
    </div>

    <!-- Nội dung bài giảng -->
    <div class="flex-grow max-w-5xl w-full mx-auto p-4 flex flex-col gap-6 my-4">
        
        <div class="bg-blue-50 border border-blue-100 p-4 rounded-xl text-blue-800 text-sm">
            <i class="ph-fill ph-info mr-1"></i> <strong>Yêu cầu:</strong> Anh/chị vui lòng xem kỹ toàn bộ nội dung bài giảng dưới đây. Nút làm bài kiểm tra nằm ở cuối trang.
        </div>

        <!-- Khung chứa tài liệu -->
        <div class="w-full bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden" style="height: 80vh;" id="pdf-container">
            <embed 
                id="pdf-viewer"
                src="" 
                type="application/pdf"
                class="w-full h-full border-none"
                title="Tài liệu đào tạo">
            </embed>
        </div>

        <!-- Khu vực chuyển sang làm bài -->
        <div class="bg-white p-8 rounded-xl shadow-sm border border-slate-200 text-center mt-4">
            <h3 class="text-xl font-bold mb-2">Đã hoàn thành phần học lý thuyết?</h3>
            <p class="text-slate-500 mb-6">Hãy đảm bảo anh/chị đã nắm vững các quy định an toàn trước khi bắt đầu làm bài thi đánh giá.</p>
            
            <a id="btn-quiz" href="#" class="inline-flex items-center justify-center gap-2 bg-indigo-600 text-white px-8 py-3.5 rounded-lg font-bold text-lg hover:bg-indigo-700 transition shadow-md hover:shadow-lg hidden">
                <i class="ph-bold ph-pencil-simple text-2xl"></i> BẮT ĐẦU LÀM BÀI KIỂM TRA
            </a>
        </div>

    </div>

    <script>
        // Lấy ID khóa học từ thanh địa chỉ (ví dụ: ?id=data_ehs_chung)
        const urlParams = new URLSearchParams(window.location.search);
        const courseId = urlParams.get('id') || 'data_ehs_chung'; // Mặc định là khóa EHS chung nếu không thấy ID

        fetch(courseId + '.json')
            .then(response => {
                if (!response.ok) throw new Error("Không tìm thấy dữ liệu khóa học");
                return response.json();
            })
            .then(data => {
                // Cập nhật Tên khóa học
                document.getElementById('course-title').innerHTML = `<i class="ph-fill ph-book-open text-2xl"></i> ${data.ten_khoa_hoc}`;
                // Nhúng file PDF
                document.getElementById('pdf-viewer').src = data.file_bai_giang;
                // Cài đặt link cho nút làm bài
                const btnQuiz = document.getElementById('btn-quiz');
                btnQuiz.href = `quiz.html?id=${courseId}`;
                btnQuiz.classList.remove('hidden');
            })
            .catch(error => {
                console.error("Lỗi:", error);
                document.getElementById('course-title').innerHTML = '<i class="ph-fill ph-warning-circle text-red-500 text-2xl"></i> Lỗi hệ thống!';
            });
    </script>
</body>
</html>
