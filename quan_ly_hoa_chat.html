<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Mục Quản Lý Hóa Chất EHS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        /* CSS ẩn cột trên thiết bị di động để không bị tràn màn hình */
        @media (max-width: 1024px) {
            .hide-on-mobile { display: none; }
        }
    </style>
</head>
<body class="bg-slate-50 p-4 md:p-8 font-sans text-slate-800">

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h2 class="text-2xl font-bold text-purple-700 mb-2 flex items-center">
                    <i class="ph-fill ph-flask text-3xl mr-2"></i>
                    Danh Mục Quản Lý Hóa Chất 2026
                </h2>
                <p class="text-slate-500">Tra cứu nhanh thông tin an toàn, phụ lục, mã CAS và tải thẻ SDS.</p>
            </div>
            
            <!-- Nút Quay lại Trang chủ -->
            <a href="index.html" class="bg-white text-slate-700 px-5 py-2.5 rounded-lg font-medium hover:bg-slate-100 transition border border-slate-200 flex items-center gap-2 shadow-sm">
                <i class="ph-bold ph-arrow-left"></i> Về Trang chủ
            </a>
        </div>

        <!-- Thanh Tìm Kiếm -->
        <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 mb-6 flex items-center">
            <i class="ph-bold ph-magnifying-glass text-slate-400 text-xl mr-3"></i>
            <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Tìm kiếm tên hóa chất, mã CAS, phụ lục, khu vực..." class="w-full outline-none text-slate-700 font-medium">
        </div>

        <!-- Bảng Dữ Liệu -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse" id="chemicalTable">
                    <thead>
                        <tr class="bg-slate-800 text-white text-xs uppercase tracking-wider">
                            <th class="p-4 font-semibold whitespace-nowrap text-center">STT (No.)</th>
                            <th class="p-4 font-semibold min-w-[250px]">Tên Hóa Chất / Nhà SX</th>
                            <th class="p-4 font-semibold hide-on-mobile">Thành phần & Hàm lượng</th>
                            <th class="p-4 font-semibold whitespace-nowrap text-center">Phụ lục</th>
                            <th class="p-4 font-semibold whitespace-nowrap">Mã CAS</th>
                            <th class="p-4 font-semibold">Khu vực sử dụng</th>
                            <th class="p-4 font-semibold text-center whitespace-nowrap">Thẻ SDS</th>
                        </tr>
                    </thead>
                    <tbody id="dataBody" class="text-sm">
                        <tr>
                            <td colspan="7" class="p-8 text-center text-slate-500">
                                <i class="ph-bold ph-spinner animate-spin text-2xl mb-2 text-purple-600"></i><br>
                                Đang tải dữ liệu hóa chất...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const JSON_URL = 'data_hoa_chat.json'; // Tải từ file json trên github
        let chemicalData = [];

        // Chạy khi trang vừa tải xong
        window.onload = function() {
            fetch(JSON_URL, { cache: "no-store" })
                .then(response => response.json())
                .then(data => {
                    chemicalData = data;
                    renderTable(chemicalData);
                })
                .catch(error => {
                    console.error('Lỗi tải dữ liệu:', error);
                    document.getElementById('dataBody').innerHTML = `<tr><td colspan="7" class="p-8 text-center text-red-500 font-bold">Lỗi: Không thể tải file data_hoa_chat.json. Vui lòng kiểm tra lại.</td></tr>`;
                });
        };

        // Hàm vẽ bảng dữ liệu
        function renderTable(dataToRender) {
            const tbody = document.getElementById('dataBody');
            tbody.innerHTML = ''; 

            if (dataToRender.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="p-8 text-center text-slate-500">Không tìm thấy hóa chất phù hợp.</td></tr>`;
                return;
            }

            dataToRender.forEach(row => {
                const tr = document.createElement('tr');
                
                // Lấy số No. thực tế
                const noVal = row["No."] || "-";
                
                // Xử lý giao diện cho chất phụ (No có dấu chấm thập phân như 1.1, 1.2)
                const isSubItem = String(noVal).includes(".");
                if(isSubItem) {
                    tr.className = "border-b border-slate-100 bg-slate-50 hover:bg-purple-50 transition-colors";
                } else {
                    tr.className = "border-b border-slate-200 hover:bg-purple-50 transition-colors";
                }

                // Gộp Tên
                const prodName = row["Production name"] && row["Production name"] !== "0" ? row["Production name"] : "";
                const normName = row["Normal name"] && row["Normal name"] !== "0" ? row["Normal name"] : "";
                const mfg = row["Manufacturing"] && row["Manufacturing"] !== "0" ? row["Manufacturing"] : "";
                let fullNameHTML = `<div class="font-bold text-slate-800 text-base">${prodName || normName || "Chưa cập nhật"}</div>`;
                if(mfg) fullNameHTML += `<div class="text-xs text-slate-500 mt-1"><i class="ph-fill ph-factory"></i> ${mfg}</div>`;

                const comp = row["Chemical composition"] && String(row["Chemical composition"]) !== "0" ? row["Chemical composition"] : "-";
                
                // === XỬ LÝ HÀM LƯỢNG (%) ===
                let percentHtml = "";
                const fromPct = row["from %"];
                const toPct = row["to %"];
                
                if ((fromPct !== undefined && fromPct !== "") || (toPct !== undefined && toPct !== "")) {
                    let pctText = "";
                    if (fromPct === toPct) {
                        pctText = `${fromPct}%`;
                    } else if (fromPct && toPct) {
                        pctText = `${fromPct} - ${toPct}%`;
                    } else {
                        pctText = `${fromPct || toPct}%`;
                    }
                    
                    // Xử lý chữ "rest" (phần còn lại)
                    if (String(fromPct).toLowerCase() === "rest" || String(toPct).toLowerCase() === "rest") {
                        pctText = "Phần còn lại";
                    }
                    
                    percentHtml = `<div class="mt-1.5"><span class="inline-flex items-center gap-1 bg-indigo-50 text-indigo-700 border border-indigo-100 px-2 py-0.5 rounded text-[11px] font-bold"><i class="ph-bold ph-drop-half text-[12px]"></i> ${pctText}</span></div>`;
                }
                
                let compHtml = `<div class="font-medium text-slate-700">${comp}</div>${percentHtml}`;

                const cas = row["CAS #"] && String(row["CAS #"]) !== "0" ? row["CAS #"] : "-";
                const position = row["Using position"] && String(row["Using position"]) !== "0" ? row["Using position"] : "-";
                
                // === XỬ LÝ CỘT PHỤ LỤC ===
                const appendixVal = row["Appendix"] && String(row["Appendix"]) !== "0" ? String(row["Appendix"]).trim() : "-";
                let appendixHtml = appendixVal;
                if (appendixVal !== "-") {
                    // Tạo nhãn màu vàng nổi bật cho các PL
                    appendixHtml = `<span class="inline-block bg-amber-100 text-amber-700 border border-amber-200 px-2 py-1 rounded text-xs font-bold whitespace-nowrap">${appendixVal}</span>`;
                } else {
                    appendixHtml = `<span class="text-slate-400 font-medium">-</span>`;
                }

                // === XỬ LÝ NÚT SDS/MSDS ===
                const sdsLink = row["Link SDS"];
                let sdsHtml = '';
                if (sdsLink && sdsLink.trim() !== "" && sdsLink !== "0") {
                    // Nếu có link
                    sdsHtml = `
                        <a href="${sdsLink}" target="_blank" class="inline-flex items-center justify-center gap-1 bg-teal-100 text-teal-700 border border-teal-200 px-3 py-1.5 rounded-md text-xs font-bold hover:bg-teal-600 hover:text-white transition cursor-pointer shadow-sm">
                            <i class="ph-bold ph-file-pdf text-sm"></i> Xem SDS
                        </a>`;
                } else {
                    // Nếu không có
                    sdsHtml = `<span class="inline-block bg-red-50 text-red-500 border border-red-100 px-2 py-1 rounded text-xs font-bold">Chưa có</span>`;
                }

                tr.innerHTML = `
                    <td class="p-4 font-bold text-center ${isSubItem ? 'text-slate-400' : 'text-slate-700'}">${noVal}</td>
                    <td class="p-4">${fullNameHTML}</td>
                    <td class="p-4 hide-on-mobile">${compHtml}</td>
                    <td class="p-4 text-center">${appendixHtml}</td>
                    <td class="p-4 text-blue-600 font-mono text-sm">${cas}</td>
                    <td class="p-4 font-medium text-slate-700">${position}</td>
                    <td class="p-4 text-center">${sdsHtml}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Hàm Lọc dữ liệu
        function filterTable() {
            const input = document.getElementById("searchInput").value.toLowerCase();
            
            const filteredData = chemicalData.filter(row => {
                const prod = String(row["Production name"] || "").toLowerCase();
                const norm = String(row["Normal name"] || "").toLowerCase();
                const cas = String(row["CAS #"] || "").toLowerCase();
                const pos = String(row["Using position"] || "").toLowerCase();
                const appx = String(row["Appendix"] || "").toLowerCase(); // Cho phép tìm kiếm cả bằng phụ lục
                
                return prod.includes(input) || norm.includes(input) || cas.includes(input) || pos.includes(input) || appx.includes(input);
            });

            renderTable(filteredData);
        }
    </script>
</body>
</html>
