<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EHS - Quản Lý Hóa Chất</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8 font-sans text-slate-800">

    <div class="max-w-[1400px] mx-auto">
        <!-- Nút Quay lại -->
        <a href="index.html" class="inline-flex items-center gap-2 text-slate-500 hover:text-blue-600 font-medium mb-4 transition">
            <i class="ph-bold ph-arrow-left"></i> Quay lại Trang chủ
        </a>

        <div class="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 border-b pb-4 gap-4">
                <div>
                    <h2 class="text-2xl font-bold text-violet-700 flex items-center">
                        <i class="ph-fill ph-flask text-3xl mr-3"></i>
                        Danh Mục Quản Lý Hóa Chất 2026
                    </h2>
                    <p class="text-slate-500 mt-1">Tra cứu nhanh thông tin thành phần, mã CAS và khu vực sử dụng (WWTP, MST...).</p>
                </div>
                
                <!-- Thanh tìm kiếm -->
                <div class="relative w-full md:w-80">
                    <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                        <i class="ph-bold ph-magnifying-glass text-slate-400"></i>
                    </div>
                    <input type="text" id="searchInput" onkeyup="searchTable()" class="bg-slate-50 border border-slate-300 text-slate-900 text-sm rounded-lg focus:ring-violet-500 focus:border-violet-500 block w-full pl-10 p-2.5 outline-none transition" placeholder="Tìm tên hóa chất, CAS, khu vực...">
                </div>
            </div>

            <!-- Trạng thái Loading -->
            <div id="loadingStatus" class="text-violet-600 font-medium flex items-center justify-center py-10 gap-2">
                <i class="ph-bold ph-spinner animate-spin text-2xl"></i> Đang tải dữ liệu hóa chất...
            </div>

            <!-- Bảng hiển thị dữ liệu (Cập nhật cột theo JSON mới) -->
            <div class="overflow-x-auto rounded-lg border border-slate-200 hidden shadow-sm" id="dataTableContainer">
                <table class="w-full text-left border-collapse min-w-[1000px]" id="chemicalTable">
                    <thead>
                        <tr class="bg-slate-800 text-white text-sm uppercase">
                            <th class="p-4 font-semibold w-12 text-center">STT</th>
                            <th class="p-4 font-semibold w-64">Tên Thương Mại / Tên Thường</th>
                            <th class="p-4 font-semibold">Thành phần Hóa học</th>
                            <th class="p-4 font-semibold">Mã CAS</th>
                            <th class="p-4 font-semibold">Phân loại</th>
                            <th class="p-4 font-semibold">Khu vực SD</th>
                            <th class="p-4 font-semibold text-center">Phụ lục</th>
                        </tr>
                    </thead>
                    <tbody id="dataBody" class="text-sm divide-y divide-slate-100">
                        <!-- Dữ liệu sẽ được JS chèn vào đây -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Tải dữ liệu từ file JSON
        window.onload = function() {
            const tableContainer = document.getElementById('dataTableContainer');
            const tbody = document.getElementById('dataBody');
            const status = document.getElementById('loadingStatus');
            
            fetch('data_hoa_chat.json', { cache: "no-store" })
                .then(response => {
                    if (!response.ok) throw new Error('Không tìm thấy file data_hoa_chat.json');
                    return response.json();
                })
                .then(data => {
                    let stt = 1; // Tự động tạo Số Thứ Tự
                    
                    data.forEach(row => {
                        const tr = document.createElement('tr');
                        tr.className = "hover:bg-violet-50 transition-colors";
                        
                        // Ghép hàm lượng % vào thành phần hóa học nếu có
                        let composition = row['Chemical composition'] || '-';
                        if (row['from %'] || row['to %']) {
                            composition += ` <span class="text-xs text-slate-400 font-mono bg-slate-100 px-1 rounded">(${row['from %'] || 0}% - ${row['to %'] || 0}%)</span>`;
                        }

                        // Map chính xác các Key tiếng Anh từ JSON của anh
                        tr.innerHTML = `
                            <td class="p-4 text-center font-medium text-slate-500 border-r border-slate-50">${stt++}</td>
                            <td class="p-4 border-r border-slate-50">
                                <div class="font-bold text-violet-700 text-base mb-1">${row['Production name'] || '-'}</div>
                                <div class="text-xs text-slate-500 flex items-center gap-1"><i class="ph-fill ph-tag"></i> ${row['Normal name'] || '-'}</div>
                            </td>
                            <td class="p-4 text-slate-700 border-r border-slate-50 leading-relaxed">${composition}</td>
                            <td class="p-4 font-mono text-blue-600 font-semibold border-r border-slate-50">${row['CAS #'] || '-'}</td>
                            <td class="p-4 text-slate-600 border-r border-slate-50">
                                <span class="bg-slate-100 px-2 py-1 rounded text-xs font-semibold border border-slate-200">${row['Classify'] || '-'}</span>
                            </td>
                            <td class="p-4 font-bold text-emerald-600 border-r border-slate-50">
                                <div class="flex items-center gap-1"><i class="ph-fill ph-map-pin"></i> ${row['Using position'] || '-'}</div>
                            </td>
                            <td class="p-4 text-center text-amber-600 font-bold">${row['Appendix'] || '-'}</td>
                        `;
                        tbody.appendChild(tr);
                    });
                    
                    // Ẩn loading, hiện bảng
                    status.classList.add('hidden');
                    tableContainer.classList.remove('hidden');
                })
                .catch(error => {
                    console.error('Lỗi:', error);
                    status.innerHTML = `<i class="ph-fill ph-warning-circle text-red-500 text-xl"></i> <span class="text-red-600">Lỗi: Không tìm thấy hoặc sai định dạng file data_hoa_chat.json</span>`;
                });
        };

        // Tính năng Tìm kiếm (Filter) giữ nguyên
        function searchTable() {
            const input = document.getElementById("searchInput");
            const filter = input.value.toUpperCase();
            const table = document.getElementById("chemicalTable");
            const tr = table.getElementsByTagName("tr");

            // Bắt đầu từ 1 để bỏ qua hàng tiêu đề
            for (let i = 1; i < tr.length; i++) {
                let rowText = tr[i].textContent || tr[i].innerText;
                
                if (rowText.toUpperCase().indexOf(filter) > -1) {
                    tr[i].style.display = ""; 
                } else {
                    tr[i].style.display = "none"; 
                }
            }
        }
    </script>
</body>
</html>
