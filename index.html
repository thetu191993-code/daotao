<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EHS Data Dashboard & Training</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="bg-slate-50 p-4 md:p-8 font-sans text-slate-800">

    <div class="max-w-5xl mx-auto">
        <div class="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200">
            <h2 class="text-2xl font-bold text-blue-700 mb-2 flex items-center">
                <i class="ph-fill ph-database text-3xl mr-2"></i>
               Đào tạo An toàn - Sức khỏe nghề nghiệp - Môi trường
            </h2>
            <p class="text-slate-500 mb-8">Nền tảng quản lý rủi ro môi trường, tối ưu hóa tài nguyên và đào tạo nhân sự.</p>
            
            <!-- Khu vực các nút công cụ -->
            <div class="flex flex-col sm:flex-row flex-wrap gap-4 mb-8 p-4 bg-slate-50 rounded-xl border border-slate-100">
                
                <!-- Nút gọi dữ liệu JSON -->
                <button onclick="EHS_2026.06_EHS MONTHLY REPORT.pdf" class="bg-blue-600 text-white px-6 py-2.5 rounded-lg font-semibold hover:bg-blue-700 transition flex items-center justify-center gap-2 shadow-sm w-full sm:w-auto">
                    <i class="ph-bold ph-arrows-clockwise"></i> Bao cao EHS tháng
                </button>

                <div class="hidden sm:block w-px bg-slate-300 mx-2"></div> <!-- Đường kẻ chia -->

                <!-- Nút Tải Tài liệu -->
                <a href="https://thetu191993-code.github.io/daotao/EHS-2022.04 GENERAL REGULATION.pdf" target="_blank" class="bg-emerald-600 text-white px-6 py-2.5 rounded-lg font-semibold hover:bg-emerald-700 transition flex items-center justify-center gap-2 shadow-sm w-full sm:w-auto">
                    <i class="ph-bold ph-file-pdf"></i> Tài liệu Quy định chung EHS
                </a>
                <!-- Nút Link tới Google Drive/OneDrive -->
                <a href="https://apicomvnasia.sharepoint.com/:f:/s/APISouth/IgBIcFVEspB6R7u_ma9-2DhiAU4rUKW8OZkbKHIWukCn-gk?e=wJiXbG" target="_blank" class="bg-blue-600 text-white px-6 py-2.5 rounded-lg font-semibold hover:bg-blue-700 transition flex items-center justify-center gap-2 shadow-sm w-full sm:w-auto">
                    <i class="ph-bold ph-cloud-arrow-down"></i> Bài giảng Đào tạo
                </a>
                <!-- Nút Làm Bài Kiểm Tra MỚI THÊM -->
               <a href="https://thetu191993-code.github.io/daotao/quiz.html" class="bg-indigo-600 text-white px-6 py-2.5 rounded-lg font-semibold hover:bg-indigo-700 transition flex items-center justify-center gap-2 shadow-sm w-full sm:w-auto">
    <i class="ph-bold ph-pencil-simple"></i> Làm Bài Kiểm Tra
                </a>

            </div>

            <!-- Bảng hiển thị dữ liệu -->
            <div class="overflow-x-auto rounded-lg border border-slate-200 hidden" id="dataTableContainer">
                <table class="w-full text-left border-collapse min-w-[600px]">
                    <thead>
                        <tr class="bg-slate-100 text-slate-600 text-sm uppercase">
                            <th class="p-4 border-b font-semibold">Ngày</th>
                            <th class="p-4 border-b font-semibold">Lưu lượng (m3)</th>
                            <th class="p-4 border-b font-semibold">COD Đầu ra (mg/L)</th>
                            <th class="p-4 border-b font-semibold">Fluoride Đầu ra (mg/L)</th>
                        </tr>
                    </thead>
                    <tbody id="dataBody" class="text-sm">
                    </tbody>
                </table>
            </div>
            
            <div id="loadingStatus" class="text-blue-600 font-medium flex items-center gap-2 hidden">
                <i class="ph-bold ph-spinner animate-spin"></i> Đang tải dữ liệu...
            </div>
        </div>
    </div>

    <script>
        const GITHUB_DATA_URL = 'https://thetu191993-code.github.io/daotao/data_ehs.json';

        function loadDataFromGitHub() {
            const tableContainer = document.getElementById('dataTableContainer');
            const tbody = document.getElementById('dataBody');
            const status = document.getElementById('loadingStatus');
            
            status.classList.remove('hidden');
            tableContainer.classList.add('hidden');
            tbody.innerHTML = ''; 

            fetch(GITHUB_DATA_URL, { cache: "no-store" })
                .then(response => response.json())
                .then(data => {
                    data.forEach(row => {
                        const tr = document.createElement('tr');
                        tr.className = "border-b hover:bg-slate-50 transition-colors";
                        tr.innerHTML = `
                            <td class="p-4 font-medium text-slate-700">${row.date || 'N/A'}</td>
                            <td class="p-4 text-blue-600 font-semibold">${row.flow || '0'}</td>
                            <td class="p-4">${row.cod || '0'}</td>
                            <td class="p-4">${row.fluoride || '0'}</td>
                        `;
                        tbody.appendChild(tr);
                    });
                    status.classList.add('hidden');
                    tableContainer.classList.remove('hidden');
                })
                .catch(error => {
                    console.error('Lỗi tải dữ liệu:', error);
                    status.classList.add('hidden');
                    alert("Chưa tìm thấy file data_ehs.json hoặc dữ liệu bị lỗi!");
                });
        }
    </script>
</body>
</html>
