<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Kiểm Tra Đào Tạo EHS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Tích hợp Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // CONFIG CỦA ANH ĐÃ ĐƯỢC GẮN SẴN VÀO ĐÂY, CHUẨN XÁC 100%
        const firebaseConfig = {
            apiKey: "AIzaSyC7iFVmgouL-sW3UlzMVOrlNQYugFiw2uA",
            authDomain: "ehs-training-app.firebaseapp.com",
            projectId: "ehs-training-app",
            storageBucket: "ehs-training-app.firebasestorage.app",
            messagingSenderId: "354083430003",
            appId: "1:354083430003:web:059953b7b9c1a9470a5406",
            measurementId: "G-74ETHWTJCW"
        };

        // Khởi tạo Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Đưa biến db ra ngoài toàn cục
        window.db = db;
        window.collection = collection;
        window.addDoc = addDoc;
        window.serverTimestamp = serverTimestamp;
    </script>
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 md:p-8 font-sans text-slate-800">

    <!-- KHUNG CHÍNH (Đã bỏ overflow-hidden và absolute để không bao giờ bị cắt chữ) -->
    <div class="max-w-2xl w-full bg-white p-6 md:p-10 rounded-2xl shadow-sm border border-slate-200" id="main-container">
        
        <!-- ========================================== -->
        <!-- MÀN HÌNH ĐĂNG NHẬP / KHAI BÁO NHÂN SỰ -->
        <!-- ========================================== -->
        <div id="login-screen">
            <div class="text-center mb-8">
                <i class="ph-fill ph-identification-card text-5xl text-blue-600 mb-4"></i>
                <h2 class="text-2xl font-bold text-slate-800 mb-2">Khai báo Thông tin</h2>
                <p class="text-slate-500">Vui lòng nhập thông tin để hệ thống ghi nhận kết quả đào tạo.</p>
            </div>
            
            <div class="space-y-4 max-w-sm mx-auto w-full">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Mã số Nhân viên (ID)</label>
                    <input type="text" id="emp-id" class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" placeholder="VD: NV001">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Họ và Tên</label>
                    <input type="text" id="emp-name" class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" placeholder="VD: Nguyễn Văn A">
                </div>
                <button onclick="startQuizWithUser()" class="w-full bg-blue-600 text-white font-bold py-3.5 rounded-lg mt-6 hover:bg-blue-700 transition shadow-md hover:shadow-lg">
                    Vào Thi
                </button>
                <p id="login-error" class="text-red-500 text-sm mt-2 hidden text-center bg-red-50 py-2 rounded-lg border border-red-100">Vui lòng điền đầy đủ Mã NV và Họ Tên!</p>
            </div>
        </div>

        <!-- ========================================== -->
        <!-- MÀN HÌNH LÀM BÀI THI (Ẩn lúc đầu) -->
        <!-- ========================================== -->
        <div id="quiz-screen" class="hidden">
            <!-- Header -->
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 border-b pb-4 gap-4">
                <div>
                    <h2 class="text-xl md:text-2xl font-bold text-blue-700 flex items-center">
                        <i class="ph-fill ph-clipboard-text text-3xl mr-2"></i>
                        Kiểm tra EHS
                    </h2>
                    <p id="user-display" class="text-sm font-medium text-slate-500 mt-1"></p>
                </div>
                <div class="bg-blue-100 text-blue-800 px-4 py-1.5 rounded-full font-bold text-sm" id="progress">
                    <!-- Javascript sẽ điền số câu vào đây -->
                </div>
            </div>

            <!-- Câu hỏi & Đáp án -->
            <div>
                <h3 class="text-xl font-medium mb-6 text-slate-700 leading-relaxed" id="question-text">Đang tải câu hỏi...</h3>
                <div class="flex flex-col gap-3" id="options-container"></div>
            </div>
        </div>

        <!-- ========================================== -->
        <!-- MÀN HÌNH KẾT QUẢ (Ẩn lúc đầu) -->
        <!-- ========================================== -->
        <div id="result-screen" class="hidden text-center py-8">
            <i class="ph-fill ph-check-circle text-6xl text-emerald-500 mb-4"></i>
            <h3 class="text-2xl font-bold mb-2 text-slate-800">Hoàn thành bài kiểm tra!</h3>
            <p class="text-lg text-slate-600 mb-8 bg-slate-50 py-3 rounded-lg border border-slate-100 inline-block px-8">
                Điểm của bạn: <span id="score" class="font-bold text-blue-600 text-3xl mx-2">0</span> / <span id="total-score" class="font-bold text-xl text-slate-400">10</span>
            </p>
            
            <p id="save-status" class="text-amber-600 font-medium mb-8 text-sm flex items-center justify-center gap-2">
                <i class="ph-bold ph-spinner animate-spin text-xl"></i> Đang lưu kết quả lên hệ thống...
            </p>

            <a href="index.html" class="bg-slate-800 text-white px-8 py-3.5 rounded-lg font-semibold hover:bg-slate-900 transition shadow-md">
                <i class="ph-bold ph-house mr-1"></i> Về Trang chủ
            </a>
        </div>

    </div>

    <script>
        // Dữ liệu 10 câu hỏi
        const quizData = [
            {
                question: "Hai nguyên nhân chính gây tai nạn lao động, bệnh nghề nghiệp là gì?",
                options: ["A. Hành vi không an toàn và Con người làm việc không an toàn", "B. Hành vi không an toàn và Môi trường làm việc không an toàn", "C. Hành vi không an toàn và thời tiết không an toàn", "D. Môi trường không an toàn và Máy móc không an toàn"],
                correctAnswer: 1
            },
            {
                question: "Theo quy định pháp luật người sử dụng lao động có bao nhiêu Quyền và Nghĩa vụ?",
                options: ["A. 5 quyền và 4 nghĩa vụ", "B. 3 quyền và 4 nghĩa vụ", "C. 4 quyền và 7 nghĩa vụ", "D. 3 quyền và 6 nghĩa vụ"],
                correctAnswer: 2
            },
            {
                question: "Theo quy định pháp luật người lao động có bao nhiêu quyền và nghĩa vụ?",
                options: ["A. 3 quyền và 6 nghĩa vụ", "B. 4 quyền và 3 nghĩa vụ", "C. 4 quyền và 3 nghĩa vụ", "D. 6 quyền và 3 nghĩa vụ"],
                correctAnswer: 3
            },
            {
                question: "Theo bài học thì có bao nhiêu yếu tố nguy hiểm và bao nhiêu yếu tố có hại?",
                options: ["A. 6 yếu tố nguy hiểm và 10 yếu tố có hại", "B. 6 yếu tố nguy hiểm và 5 yêu tố có hại", "C. 6 yếu tố nguy hiểm và 8 yếu tố có hại", "D. 6 yếu tố nguy hiểm và 7 yếu tố có hại"],
                correctAnswer: 2
            },
             {
                question: "Hành vi nào sao đây bị cấm khi vào trong khu vực sản xuất",
                options: ["A. Mang đầy đủ bảo hộ lao động theo quy định", "B. Đi đúng phần đường người đi bộ", "C. Đeo nữ trang, để móng tay dài, sử dụng điện thoại và mang nước ngọt, thức ăn vào nhà xưởng", "D. Tuân thủ quy định về an toàn nơi làm việc"],
                correctAnswer: 2
            },
            {
                question: "Bạn sẽ thực hiện việc khạc nhổ, vệ sinh và hút thuốc ở đâu?",
                options: ["A. Bất cứ khu vực nào trong nhà xưởng", "B. Chỉ thực hiện việc vệ sinh khạc nhổ trong khu vực toilet, hút thuốc tại nhà hút thuốc"],
                correctAnswer: 1
            },
             {
                question: "Trang phục bảo hộ lao động cơ bản công ty đang áp dụng",
                options: ["A. Chỉ có áo/quần đồng phục và nút tai", "B. Chỉ thực hiện mang áo quần đồng phục và giày bảo hộ", "C. Mang găng tay, nút tai và áo/quần đồng phục", "D. Mang đầy đủ trang phục bảo hộ như đồng phục, giày bảo hộ, nón trum tóc, nút tai chống ồn và các trang phục yêu cầu khác được quy định"],
                correctAnswer: 3
            },
            {
                question: "Khi gặp các vấn đề mất an toàn khu vực làm việc của bạn, bạn sẽ làm gì?",
                options: ["A. Báo cho trưởng ca/trưởng nhóm/phòng EHS", "B. Bỏ qua vì không ảnh hướng đến mình"],
                correctAnswer: 0
            },
            {
                question: "Công ty quy định mấy bước thực hiện khi có cháy và các bước như thế nào?",
                options: ["A. 3 Bước, Báo cháy - Thoát nạn - Tập kết", "B. 4 Bước, Báo cháy - Cúp điện - Thoát nạn - Tập kết", "C. 5 Bước, Báo cháy - Cúp điện - Chữa cháy - Thoát nạn - Tập kết", "D. 4 Bước, Báo cháy - Cúp điện - Chữa cháy - Thoát nạn"],
                correctAnswer: 2
            },
            {
                question: "Kỹ năng nào là BẮT BUỘC khi di chuyển trong khu vực xưởng có nhiều khói độc?",
                options: ["A. Đứng thẳng người để dễ quan sát biển báo trên cao", "B. Dùng cả hai tay che mắt để không bị cay", "C. Nhắm mắt và chạy theo trí nhớ", "D. Cúi khom hoặc bò thấp, một tay bám men theo tường/kệ cố định, một tay che kín mũi miệng"],
                correctAnswer: 3
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let currentUser = { id: "", name: "" };

        // Các thành phần HTML
        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const progressText = document.getElementById('progress');
        const loginScreen = document.getElementById('login-screen');
        const quizScreen = document.getElementById('quiz-screen');
        const resultScreen = document.getElementById('result-screen');
        const scoreDisplay = document.getElementById('score');
        const totalScoreDisplay = document.getElementById('total-score');

        // Hàm bắt đầu bài thi
        function startQuizWithUser() {
            const idInput = document.getElementById('emp-id').value.trim();
            const nameInput = document.getElementById('emp-name').value.trim();
            
            if (idInput === "" || nameInput === "") {
                document.getElementById('login-error').classList.remove('hidden');
                return;
            }

            currentUser.id = idInput;
            currentUser.name = nameInput;
            
            document.getElementById('user-display').innerText = `Nhân sự: ${currentUser.name} (${currentUser.id})`;
            
            // Xử lý chuyển đổi màn hình (Giấu Đăng nhập, Hiện Bài thi)
            loginScreen.classList.add('hidden');
            quizScreen.classList.remove('hidden');
            
            // Đặt tổng điểm
            totalScoreDisplay.innerText = quizData.length;
            
            loadQuestion();
        }

        // Tải câu hỏi
        function loadQuestion() {
            const currentData = quizData[currentQuestionIndex];
            questionText.innerText = currentData.question;
            progressText.innerText = `Câu ${currentQuestionIndex + 1} / ${quizData.length}`;
            optionsContainer.innerHTML = '';

            currentData.options.forEach((option, index) => {
                const button = document.createElement('button');
                button.innerText = option;
                button.className = "w-full text-left p-4 rounded-xl border-2 border-slate-100 hover:border-blue-500 hover:bg-blue-50 transition font-medium text-slate-700 bg-white";
                button.onclick = () => selectAnswer(index);
                optionsContainer.appendChild(button);
            });
        }

        // Chọn đáp án
        function selectAnswer(selectedIndex) {
            if (selectedIndex === quizData[currentQuestionIndex].correctAnswer) score++;
            
            currentQuestionIndex++;
            if (currentQuestionIndex < quizData.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        // Hiện kết quả và Ghi lên Firebase
        async function showResults() {
            quizScreen.classList.add('hidden');
            resultScreen.classList.remove('hidden');
            scoreDisplay.innerText = score;

            const statusText = document.getElementById('save-status');

            try {
                if (!window.db) throw new Error("Chưa kết nối Firebase");

                await window.addDoc(window.collection(window.db, "ket_qua_kiem_tra"), {
                    nhan_vien_id: currentUser.id,
                    ho_ten: currentUser.name,
                    diem_so: score,
                    tong_cau: quizData.length,
                    thoi_gian_nop: window.serverTimestamp()
                });
                
                statusText.innerHTML = '<i class="ph-fill ph-check-circle text-emerald-600 text-xl"></i> <span class="text-emerald-700">Lưu kết quả thành công!</span>';
            } catch (error) {
                console.error("Lỗi khi lưu: ", error);
                statusText.innerHTML = '<i class="ph-fill ph-warning-circle text-red-600 text-xl"></i> <span class="text-red-700">Lỗi lưu kết quả. Vui lòng thử lại.</span>';
            }
        }
    </script>
</body>
</html>
