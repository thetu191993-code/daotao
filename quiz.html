<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Kiểm Tra EHS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <script>
        // CHỐT CHẶN ĐĂNG NHẬP
        if (!localStorage.getItem("ehs_user_id")) {
            alert("Bạn chưa đăng nhập! Vui lòng đăng nhập hệ thống để làm bài thi.");
            window.location.href = "login.html";
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // Cấu hình Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyC7iFVmgoUL-sW3UlaMV0rlNQYugFiw2uA",
            authDomain: "ehs-training-app.firebaseapp.com",
            projectId: "ehs-training-app",
            storageBucket: "ehs-training-app.firebasestorage.app",
            messagingSenderId: "354083430003",
            appId: "1:354083430003:web:059953b7b9c1a9470a5406",
            measurementId: "G-74ETHWTJCW"
        };
        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.collection = collection;
        window.addDoc = addDoc;
    </script>
</head>
<body class="bg-slate-50 p-4 md:p-8 font-sans text-slate-800">
    <div id="quiz-app" class="max-w-3xl mx-auto bg-white p-6 md:p-10 rounded-2xl shadow-sm border border-slate-200">
        
        <!-- Nút Quay lại -->
        <div class="mb-6">
            <a href="index.html" class="inline-flex items-center gap-2 text-slate-500 hover:text-blue-600 font-medium transition">
                <i class="ph-bold ph-arrow-left"></i> Về Trang chủ
            </a>
        </div>

        <!-- Khung báo lỗi chẩn đoán -->
        <div id="error-log" class="hidden bg-red-50 border border-red-200 text-red-700 px-5 py-4 rounded-xl mb-6">
            <h4 class="font-bold text-lg flex items-center gap-2 mb-1">
                <i class="ph-fill ph-warning-circle text-xl"></i> Lỗi: Không tìm thấy bài thi!
            </h4>
            <p id="error-text" class="text-sm font-mono bg-white p-2 rounded border border-red-100 mt-2"></p>
            <p class="text-sm mt-3">Vui lòng kiểm tra lại xem file JSON có nằm đúng thư mục trên GitHub chưa.</p>
        </div>
        
        <!-- Đang tải -->
        <div id="loader" class="text-center py-12">
            <i class="ph-bold ph-spinner animate-spin text-5xl text-blue-600 mb-4"></i>
            <p class="font-bold text-slate-600 text-lg">Hệ thống đang chuẩn bị dữ liệu bài thi...</p>
        </div>

        <!-- Tiêu đề bài thi -->
        <div id="quiz-header" class="hidden text-center text-blue-800 font-bold text-2xl mb-8 pb-6 border-b border-slate-100 flex-col items-center gap-2">
            <!-- JS sẽ chèn tiêu đề vào đây -->
        </div>

        <!-- Nơi chứa câu hỏi -->
        <div id="quiz-content" class="hidden space-y-6"></div>
        
        <!-- Nút nộp bài -->
        <button id="btn-submit" class="hidden w-full bg-blue-600 text-white font-bold py-4 rounded-xl mt-8 hover:bg-blue-700 transition shadow-md text-lg flex justify-center items-center gap-2">
            <i class="ph-bold ph-paper-plane-tilt text-2xl"></i> Nộp Bài Kiểm Tra
        </button>
    </div>

    <script>
        const errorLog = document.getElementById('error-log');
        const errorText = document.getElementById('error-text');
        
        const showError = (msg) => {
            errorText.innerText = "Đường dẫn lỗi: " + msg;
            errorLog.classList.remove('hidden');
            document.getElementById('loader').classList.add('hidden');
        };

        const urlParams = new URLSearchParams(window.location.search);
        const courseId = urlParams.get('id') || 'data_ehs_chung';
        
        // ĐƯỜNG DẪN TUYỆT ĐỐI (Fix lỗi không tìm thấy file)
        const jsonPath = `https://thetu191993-code.github.io/daotao/${courseId}.json`;

        fetch(jsonPath, { cache: "no-store" })
            .then(res => {
                if (!res.ok) throw new Error(jsonPath);
                return res.json();
            })
            .then(data => {
                window.quizData = data;
                document.getElementById('loader').classList.add('hidden');
                
                // Hiển thị tiêu đề
                const header = document.getElementById('quiz-header');
                header.innerHTML = `
                    <i class="ph-fill ph-graduation-cap text-4xl text-blue-600"></i>
                    <span>${data.ten_khoa_hoc}</span>
                `;
                header.classList.remove('hidden');
                header.classList.add('flex');

                // Render câu hỏi
                const container = document.getElementById('quiz-content');
                if (!data.cau_hoi || !Array.isArray(data.cau_hoi)) {
                    throw new Error("Cấu trúc file JSON bị sai phần 'cau_hoi'. " + jsonPath);
                }

                data.cau_hoi.forEach((q, index) => {
                    const div = document.createElement('div');
                    div.className = "p-6 bg-slate-50 rounded-2xl border border-slate-200 hover:border-blue-300 transition";
                    
                    let htmlContent = `<p class="font-bold text-slate-800 mb-4 text-lg">Câu ${index + 1}: ${q.question}</p>`;
                    htmlContent += `<div class="space-y-3">`;
                    
                    q.options.forEach((opt, optIndex) => {
                        htmlContent += `
                            <label class="flex items-start p-4 bg-white border border-slate-200 rounded-xl cursor-pointer hover:border-blue-500 hover:bg-blue-50 transition group">
                                <input type="radio" name="q${index}" value="${optIndex}" class="mt-1 mr-3 w-5 h-5 text-blue-600 border-slate-300 focus:ring-blue-500"> 
                                <span class="text-slate-700 font-medium group-hover:text-blue-800">${opt}</span>
                            </label>`;
                    });
                    
                    htmlContent += `</div>`;
                    div.innerHTML = htmlContent;
                    container.appendChild(div);
                });
                
                container.classList.remove('hidden');
                document.getElementById('btn-submit').classList.remove('hidden');
            })
            .catch(err => {
                showError(err.message);
            });

        // Xử lý nộp bài
        document.getElementById('btn-submit').onclick = async () => {
            const btn = document.getElementById('btn-submit');
            const quizData = window.quizData;
            let score = 0;
            let answered = 0;
            let chiTietBaiLam = []; // <-- Mảng mới để lưu chi tiết bài làm

            quizData.cau_hoi.forEach((q, index) => {
                const selected = document.querySelector(`input[name="q${index}"]:checked`);
                if (selected) {
                    answered++;
                    const selectedValue = parseInt(selected.value);
                    const isCorrect = (selectedValue === q.correctAnswer);
                    
                    if (isCorrect) score++;

                    // Ghi nhận chi tiết từng câu
                    chiTietBaiLam.push({
                        cau_so: index + 1,
                        cau_hoi: q.question,
                        dap_an_da_chon: q.options[selectedValue],
                        dap_an_dung: q.options[q.correctAnswer],
                        ket_qua: isCorrect ? "Đúng" : "Sai"
                    });
                }
            });

            if (answered < quizData.cau_hoi.length) {
                alert(`Bạn mới làm ${answered}/${quizData.cau_hoi.length} câu. Vui lòng hoàn thành tất cả!`);
                return;
            }

            // Đổi text nút khi đang lưu
            btn.innerHTML = '<i class="ph-bold ph-spinner animate-spin text-2xl"></i> Đang nộp bài...';
            btn.disabled = true;

            try {
                // Lấy thông tin người đăng nhập từ máy
                const userName = localStorage.getItem("ehs_user_name") || localStorage.getItem("ehs_user_id") || "Khách";
                const userId = localStorage.getItem("ehs_user_id") || "N/A";

                // Gửi dữ liệu lên Firebase
                await window.addDoc(window.collection(window.db, "ket_qua_kiem_tra"), {
                    ho_ten: userName,
                    nhan_vien_id: userId,
                    diem_so: score,
                    tong_cau: quizData.cau_hoi.length,
                    ten_khoa_hoc: quizData.ten_khoa_hoc,
                    thoi_gian_nop: new Date(),
                    chi_tiet: chiTietBaiLam // <-- Đẩy thêm chi tiết lên Firebase
                });
                
                alert(`Nộp bài thành công!\nBạn đạt: ${score}/${quizData.cau_hoi.length} điểm.`);
                window.location.href = "index.html"; // Đá về trang chủ
            } catch (e) {
                alert("Lỗi lưu điểm lên hệ thống: " + e.message);
                btn.innerHTML = '<i class="ph-bold ph-paper-plane-tilt text-2xl"></i> Thử nộp lại';
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
