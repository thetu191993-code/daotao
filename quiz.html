<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Kiểm Tra EHS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC7iFVmgouL-sW3UlzMVOrlNQYugFiw2uA",
            authDomain: "ehs-training-app.firebaseapp.com",
            projectId: "ehs-training-app",
            storageBucket: "ehs-training-app.firebasestorage.app",
            messagingSenderId: "354083430003",
            appId: "1:354083430003:web:059953b7b9c1a9470a5406",
            measurementId: "G-74ETHWTJCW"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db;
        window.collection = collection;
        window.addDoc = addDoc;
    </script>
</head>
<body class="bg-slate-50 p-4 md:p-8">
    <div id="quiz-app" class="max-w-2xl mx-auto bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
        <div id="loader" class="text-center">
            <i class="ph-bold ph-spinner animate-spin text-4xl text-indigo-600"></i>
            <p class="mt-4 font-bold">Đang tải nội dung bài thi...</p>
        </div>
        <div id="quiz-content" class="hidden"></div>
        <button id="btn-submit" class="hidden w-full bg-emerald-600 text-white font-bold py-3 rounded-lg mt-6 hover:bg-emerald-700 transition">Nộp bài</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const courseId = urlParams.get('id') || 'data_ehs_chung';
        const jsonPath = `https://thetu191993-code.github.io/daotao/${courseId}.json`;
        let quizData = null;

        fetch(jsonPath).then(res => res.json()).then(data => {
            quizData = data;
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('quiz-content').classList.remove('hidden');
            document.getElementById('btn-submit').classList.remove('hidden');
            renderQuiz();
        });

        function renderQuiz() {
            const container = document.getElementById('quiz-content');
            container.innerHTML = `<h2 class="text-2xl font-bold mb-6 text-indigo-700">${quizData.ten_khoa_hoc}</h2>`;
            quizData.cau_hoi.forEach((q, index) => {
                const div = document.createElement('div');
                div.className = "mb-8 p-4 bg-slate-50 rounded-lg";
                div.innerHTML = `<p class="font-bold mb-3">${index + 1}. ${q.question}</p>`;
                q.options.forEach((opt, optIndex) => {
                    div.innerHTML += `
                        <label class="block mb-2 cursor-pointer hover:text-indigo-600">
                            <input type="radio" name="q${index}" value="${optIndex}" class="mr-2"> ${opt}
                        </label>`;
                });
                container.appendChild(div);
            });
        }

        document.getElementById('btn-submit').onclick = async () => {
            let score = 0;
            quizData.cau_hoi.forEach((q, index) => {
                const selected = document.querySelector(`input[name="q${index}"]:checked`);
                if (selected && parseInt(selected.value) === q.correctAnswer) score++;
            });

            // Lưu điểm lên Firebase
            try {
                await window.addDoc(window.collection(window.db, "ket_qua_kiem_tra"), {
                    ho_ten: localStorage.getItem("ehs_user_name") || "Khách",
                    nhan_vien_id: localStorage.getItem("ehs_user_id") || "N/A",
                    diem_so: score,
                    tong_cau: quizData.cau_hoi.length,
                    ten_khoa_hoc: quizData.ten_khoa_hoc,
                    thoi_gian_nop: new Date()
                });
                alert(`Chúc mừng! Bạn đạt ${score}/${quizData.cau_hoi.length} điểm.`);
                window.location.href = "index.html";
            } catch (e) {
                alert("Lỗi lưu điểm: " + e.message);
            }
        };
    </script>
</body>
</html>
