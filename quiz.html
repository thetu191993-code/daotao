<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Kiểm Tra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-2xl w-full bg-white p-10 rounded-2xl shadow-sm border text-center">
        <div id="loading">
            <i class="ph-bold ph-spinner animate-spin text-5xl text-indigo-600 mb-4"></i>
            <h3 class="text-xl font-bold">Đang tải bài thi...</h3>
        </div>
        <div id="error-box" class="hidden text-red-600">
            <i class="ph-fill ph-warning-circle text-6xl mb-4"></i>
            <h3 class="text-2xl font-bold mb-2">Lỗi tải bài thi!</h3>
            <p id="error-detail" class="font-mono bg-slate-100 p-4 rounded"></p>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const courseId = urlParams.get('id') || 'data_ehs_chung';
        const jsonPath = `./${courseId}.json`;

        fetch(jsonPath)
            .then(res => {
                if (!res.ok) throw new Error("Không tìm thấy file: " + jsonPath);
                return res.json();
            })
            .then(data => {
                document.getElementById('loading').innerHTML = `<h3 class="text-2xl font-bold text-emerald-600">Đã tải bài thi: ${data.ten_khoa_hoc}</h3>`;
                // Xử lý bài thi tại đây...
            })
            .catch(err => {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('error-box').classList.remove('hidden');
                document.getElementById('error-detail').innerText = err.message;
            });
    </script>
</body>
</html>
