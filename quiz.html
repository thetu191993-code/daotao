<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Kiểm Tra Đào Tạo EHS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Tích hợp Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // LƯU Ý: Nếu trước đó anh có đổi apiKey mới, hãy dán apiKey mới đó vào đây nhé!
        const firebaseConfig = {
            apiKey: "AIzaSyC7iFVmgouL-sW3UlzMVOrlNQYugFiw2uA", 
            authDomain: "ehs-training-app.firebaseapp.com",
            projectId: "ehs-training-app",
            storageBucket: "ehs-training-app.firebasestorage.app",
            messagingSenderId: "354083430003",
            appId: "1:354083430003:web:059953b7b9c1a9470a5406",
            measurementId: "G-74ETHWTJCW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.db = db;
        window.collection = collection;
        window.addDoc = addDoc;
        window.serverTimestamp = serverTimestamp;
    </script>
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 md:p-8 font-sans text-slate-800">

    <div class="max-w-2xl w-full bg-white p-6 md:p-10 rounded-2xl shadow-sm border border-slate-200" id="main-container">
        
        <!-- MÀN HÌNH CHỜ BẮT ĐẦU -->
        <div id="start-screen" class="bg-white flex flex-col items-center justify-center py-4">
            <div class="text-center mb-6">
                <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-indigo-100 text-indigo-600 mb-4">
                    <i class="ph-fill ph-student text-5xl"></i>
                </div>
                <h2 class="text-2xl font-bold text-slate-800 mb-2" id="welcome-text">Đang kiểm tra thông tin...</h2>
                <p class="text-slate-500">Hệ thống sẽ ghi nhận điểm số bài thi cho tài khoản này.</p>
            </div>
            
            <div class="max-w-sm mx-auto w-full bg-amber-50 border border-amber-200 text-amber-800 p-3 rounded-lg text-center font-bold text-sm mb-6 flex items-center justify-center gap-2">
                <i class="ph-fill ph-warning-circle text-lg"></i> Hạn chót hoàn thành: <span id="deadline-text">31/07/2026</span>
            </div>

            <button id="btn-start" onclick="startQuiz()" class="w-full max-w-sm bg-indigo-600 text-white font-bold py-3.5 rounded-lg mt-4 hover:bg-indigo-700 transition flex justify-center items-center gap-2 shadow-md hidden">
                <i class="ph-bold ph-play text-xl"></i> Bắt đầu làm bài
            </button>
        </div>

        <!-- MÀN HÌNH LÀM BÀI THI -->
        <div id="quiz-screen" class="hidden">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 border-b pb-4 gap-4">
                <div>
                    <h2 class="text-xl md:text-2xl font-bold text-indigo-700 flex items-center">
                        <i class="ph-fill ph-clipboard-text text-3xl mr-2"></i>
                        Kiểm tra EHS
                    </h2>
                    <p id="user-display" class="text-sm font-medium text-slate-500 mt-1"></p>
                </div>
                <div class="bg-indigo-100 text-indigo-800 px-4 py-1.5 rounded-full font-bold text-sm" id="progress"></div>
            </div>
            <div>
                <h3 class="text-xl font-medium mb-6 text-slate-700 leading-relaxed" id="question-text">Đang tải câu hỏi...</h3>
                <div class="flex flex-col gap-3" id="options-container"></div>
            </div>
        </div>

        <!-- MÀN HÌNH KẾT QUẢ -->
        <div id="result-screen" class="hidden text-center py-8">
            <i class="ph-fill ph-check-circle text-6xl text-emerald-500 mb-4"></i>
            <h3 class="text-2xl font-bold mb-2 text-slate-800">Hoàn thành bài kiểm tra!</h3>
            <p class="text-lg text-slate-600 mb-8 bg-slate-50 py-3 rounded-lg border border-slate-100 inline-block px-8">
                Điểm của bạn: <span id="score" class="font-bold text-indigo-600 text-3xl mx-2">0</span> / <span id="total-score" class="font-bold text-xl text-slate-400">10</span>
            </p>
            <p id="save-status" class="text-amber-600 font-medium mb-8 text-sm flex items-center justify-center gap-2">
                <i class="ph-bold ph-spinner animate-spin text-xl"></i> Đang lưu kết quả lên hệ thống...
            </p>
            <a href="index.html" class="bg-slate-800 text-white px-8 py-3.5 rounded-lg font-semibold hover:bg-slate-900 transition shadow-md inline-flex items-center gap-2">
                <i class="ph-bold ph-house"></i> Về Trang chủ
            </a>
        </div>

    </div>

    <script>
        let quizData = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let userAnswers = []; 
        let courseName = "Bài Kiểm Tra EHS";
        
        // Lấy thông tin User từ trình duyệt (đã lưu lúc đăng nhập)
        const userId = localStorage.getItem("ehs_user_id");
        const userName = localStorage.getItem("ehs_user_name") || userId; // Nếu không có tên thì lấy ID
        const DEADLINE_DATE = new Date("2026-07-31T23:59:59"); 

        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const progressText = document.getElementById('progress');
        const startScreen = document.getElementById('start-screen');
        const quizScreen = document.getElementById('quiz-screen');
        const resultScreen = document.getElementById('result-screen');
        const scoreDisplay = document.getElementById('score');
        const totalScoreDisplay = document.getElementById('total-score');
        const welcomeText = document.getElementById('welcome-text');
        const btnStart = document.getElementById('btn-start');

        window.onload = function() {
            // KIỂM TRA ĐĂNG NHẬP
            if (!userId) {
                alert("Bạn chưa đăng nhập! Vui lòng đăng nhập để làm bài thi.");
                window.location.href = "login.html";
                return;
            }

            // Hiển thị lời chào
            welcomeText.innerHTML = `Xin chào, <span class="text-indigo-600">${userName}</span>`;
            document.getElementById('user-display').innerText = `Nhân sự: ${userName} (${userId})`;

            // TẢI CÂU HỎI
            const urlParams = new URLSearchParams(window.location.search);
            const courseId = urlParams.get('id');

            if (courseId) {
                fetch(courseId + '.json', { cache: "no-store" })
                    .then(response => {
                        if (!response.ok) throw new Error("File JSON không tồn tại");
                        return response.json();
                    })
                    .then(data => {
                        quizData = data.cau_hoi;
                        courseName = data.ten_khoa_hoc;
                        document.title = "Bài thi: " + courseName;
                        btnStart.classList.remove('hidden'); // Hiện nút bắt đầu khi tải xong
                    })
                    .catch(error => {
                        welcomeText.innerHTML = `<span class="text-red-600">Lỗi tải dữ liệu bài thi!</span>`;
                        welcomeText.classList.add('text-lg');
                        console.error(error);
                    });
            } else {
                welcomeText.innerHTML = `<span class="text-amber-600">Không tìm thấy mã khóa học!</span>`;
            }
        };

        function startQuiz() {
            startScreen.classList.add('hidden');
            quizScreen.classList.remove('hidden');
            totalScoreDisplay.innerText = quizData.length;
            loadQuestion();
        }

        function loadQuestion() {
            const currentData = quizData[currentQuestionIndex];
            questionText.innerText = currentData.question;
            progressText.innerText = `Câu ${currentQuestionIndex + 1} / ${quizData.length}`;
            optionsContainer.innerHTML = '';

            currentData.options.forEach((option, index) => {
                const button = document.createElement('button');
                button.innerText = option;
                button.className = "w-full text-left p-4 rounded-xl border-2 border-slate-100 hover:border-indigo-500 hover:bg-indigo-50 transition font-medium text-slate-700 bg-white";
                button.onclick = () => selectAnswer(index, option);
                optionsContainer.appendChild(button);
            });
        }

        function selectAnswer(selectedIndex, selectedText) {
            const currentData = quizData[currentQuestionIndex];
            const isCorrect = (selectedIndex === currentData.correctAnswer);
            
            if (isCorrect) { score++; }
            
            userAnswers.push({
                cau_hoi: currentData.question,
                dap_an_da_chon: selectedText,
                ket_qua: isCorrect ? "Đúng" : "Sai"
            });
            
            currentQuestionIndex++;
            if (currentQuestionIndex < quizData.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        async function showResults() {
            quizScreen.classList.add('hidden');
            resultScreen.classList.remove('hidden');
            scoreDisplay.innerText = score;
            const statusText = document.getElementById('save-status');

            const now = new Date();
            const submitStatus = now <= DEADLINE_DATE ? "Đúng hạn" : "Trễ hạn";

            try {
                if (!window.db) throw new Error("Chưa kết nối Firebase");

                await window.addDoc(window.collection(window.db, "ket_qua_kiem_tra"), {
                    nhan_vien_id: userId.toUpperCase(),
                    ho_ten: userName,
                    diem_so: score,
                    tong_cau: quizData.length,
                    thoi_gian_nop: window.serverTimestamp(),
                    han_chot: "31/07/2026",
                    trang_thai_nop: submitStatus,
                    ten_khoa_hoc: courseName,
                    chi_tiet_bai_lam: userAnswers 
                });
                
                statusText.innerHTML = '<i class="ph-fill ph-check-circle text-emerald-600 text-xl"></i> <span class="text-emerald-700 font-bold">Đã lưu điểm số của bạn lên hệ thống!</span>';
            } catch (error) {
                console.error("Lỗi khi lưu kết quả: ", error);
                statusText.innerHTML = '<i class="ph-fill ph-warning-circle text-red-600 text-xl"></i> <span class="text-red-700">Lỗi lưu kết quả. Vui lòng thử lại.</span>';
            }
        }
    </script>
</body>
</html>
