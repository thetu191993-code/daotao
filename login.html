<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - EHS Training</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Tích hợp Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC7iFVmgouL-sW3UlzMVOrlNQYugFiw2uA",
            authDomain: "ehs-training-app.firebaseapp.com",
            projectId: "ehs-training-app",
            storageBucket: "ehs-training-app.firebasestorage.app",
            messagingSenderId: "354083430003",
            appId: "1:354083430003:web:059953b7b9c1a9470a5406",
            measurementId: "G-74ETHWTJCW"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.auth = auth;
        window.db = db;
        window.signInWithEmailAndPassword = signInWithEmailAndPassword;
        window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;
        window.doc = doc;
        window.setDoc = setDoc;
    </script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4 font-sans text-slate-800 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]">

    <div class="max-w-md w-full bg-white p-8 rounded-2xl shadow-xl border border-slate-200">
        
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-blue-100 text-blue-600 mb-4">
                <i class="ph-fill ph-shield-check text-4xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-slate-800">Hệ Thống Đào Tạo EHS</h2>
            <p class="text-slate-500 text-sm mt-1" id="form-subtitle">Vui lòng đăng nhập để tiếp tục</p>
        </div>

        <!-- THÔNG BÁO LỖI -->
        <div id="error-msg" class="hidden bg-red-50 text-red-600 p-3 rounded-lg text-sm font-medium mb-4 text-center border border-red-100">
            Lỗi đăng nhập!
        </div>

        <!-- FORM ĐĂNG NHẬP / ĐĂNG KÝ -->
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Mã Nhân Viên (ID)</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="ph-bold ph-identification-card text-slate-400 text-lg"></i>
                    </div>
                    <input type="text" id="emp-id" class="w-full pl-10 pr-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none uppercase" placeholder="VD: NV001">
                </div>
            </div>

            <!-- Trường Họ Tên (Chỉ hiện khi Đăng ký) -->
            <div id="name-field" class="hidden">
                <label class="block text-sm font-semibold text-slate-700 mb-1">Họ và Tên</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="ph-bold ph-user text-slate-400 text-lg"></i>
                    </div>
                    <input type="text" id="emp-name" class="w-full pl-10 pr-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" placeholder="VD: Nguyễn Văn A">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Mật khẩu</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="ph-bold ph-lock-key text-slate-400 text-lg"></i>
                    </div>
                    <input type="password" id="emp-pass" class="w-full pl-10 pr-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" placeholder="••••••••">
                </div>
            </div>

            <button id="btn-submit" onclick="handleAuth()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg mt-2 hover:bg-blue-700 transition flex justify-center items-center gap-2 shadow-md">
                Đăng nhập
            </button>
        </div>

        <!-- CHUYỂN ĐỔI CHẾ ĐỘ -->
        <div class="mt-6 text-center text-sm text-slate-600 border-t border-slate-100 pt-4">
            <span id="toggle-text">Nhân sự mới?</span> 
            <button onclick="toggleMode()" id="btn-toggle" class="text-blue-600 font-bold hover:underline ml-1">Đăng ký tài khoản</button>
        </div>
    </div>

    <script>
        let isLoginMode = true; // Mặc định là chế độ Đăng nhập

        function toggleMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('error-msg').classList.add('hidden');
            
            const nameField = document.getElementById('name-field');
            const btnSubmit = document.getElementById('btn-submit');
            const toggleText = document.getElementById('toggle-text');
            const btnToggle = document.getElementById('btn-toggle');
            const subtitle = document.getElementById('form-subtitle');

            if (isLoginMode) {
                // Chuyển về Đăng nhập
                nameField.classList.add('hidden');
                btnSubmit.innerHTML = "Đăng nhập";
                toggleText.innerText = "Nhân sự mới?";
                btnToggle.innerText = "Đăng ký tài khoản";
                subtitle.innerText = "Vui lòng đăng nhập để tiếp tục";
            } else {
                // Chuyển sang Đăng ký
                nameField.classList.remove('hidden');
                btnSubmit.innerHTML = "Tạo tài khoản & Đăng nhập";
                toggleText.innerText = "Đã có tài khoản?";
                btnToggle.innerText = "Đăng nhập ngay";
                subtitle.innerText = "Tạo tài khoản mới bằng Mã NV";
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('error-msg');
            errorDiv.innerText = message;
            errorDiv.classList.remove('hidden');
        }

        async function handleAuth() {
            const idInput = document.getElementById('emp-id').value.trim().toLowerCase();
            const passInput = document.getElementById('emp-pass').value.trim();
            const nameInput = document.getElementById('emp-name').value.trim();
            const btnSubmit = document.getElementById('btn-submit');

            if (!idInput || !passInput) {
                showError("Vui lòng nhập đầy đủ Mã NV và Mật khẩu!");
                return;
            }

            if (!isLoginMode && !nameInput) {
                showError("Vui lòng nhập Họ và Tên!");
                return;
            }

            if (passInput.length < 6) {
                showError("Mật khẩu phải có ít nhất 6 ký tự!");
                return;
            }

            // Tạo email ảo từ Mã NV
            const fakeEmail = `${idInput}@ehs.com`;

            // Vô hiệu hóa nút trong lúc chờ
            const originalBtnText = btnSubmit.innerHTML;
            btnSubmit.innerHTML = '<i class="ph-bold ph-spinner animate-spin text-xl"></i> Đang xử lý...';
            btnSubmit.disabled = true;
            document.getElementById('error-msg').classList.add('hidden');

            try {
                if (isLoginMode) {
                    // XỬ LÝ ĐĂNG NHẬP
                    await window.signInWithEmailAndPassword(window.auth, fakeEmail, passInput);
                    // Lưu thông tin phiên đăng nhập vào LocalStorage
                    localStorage.setItem("ehs_user_id", idInput.toUpperCase());
                    window.location.href = "index.html"; // Chuyển về trang chủ
                } else {
                    // XỬ LÝ ĐĂNG KÝ
                    const userCredential = await window.createUserWithEmailAndPassword(window.auth, fakeEmail, passInput);
                    const user = userCredential.user;
                    
                    // Lưu Họ Tên vào cơ sở dữ liệu Firestore
                    await window.setDoc(window.doc(window.db, "users", user.uid), {
                        ma_nv: idInput.toUpperCase(),
                        ho_ten: nameInput,
                        role: "user", // Mặc định là nhân viên bình thường
                        ngay_tao: new Date().toISOString()
                    });

                    // Lưu thông tin phiên
                    localStorage.setItem("ehs_user_id", idInput.toUpperCase());
                    localStorage.setItem("ehs_user_name", nameInput);
                    
                    alert("Tạo tài khoản thành công! Bạn sẽ được chuyển về Trang chủ.");
                    window.location.href = "index.html";
                }
            } catch (error) {
                console.error("Lỗi:", error);
                let errorText = "Có lỗi xảy ra. Vui lòng thử lại.";
                if (error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found') {
                    errorText = "Sai Mã NV hoặc Mật khẩu!";
                } else if (error.code === 'auth/email-already-in-use') {
                    errorText = "Mã NV này đã được đăng ký! Vui lòng chọn Đăng nhập.";
                } else if (error.code === 'auth/network-request-failed') {
                    errorText = "Lỗi mạng. Vui lòng kiểm tra kết nối internet.";
                }
                showError(errorText);
            } finally {
                btnSubmit.innerHTML = originalBtnText;
                btnSubmit.disabled = false;
            }
        }
    </script>
</body>
</html>
